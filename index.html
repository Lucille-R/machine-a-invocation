<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine à invoquer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
		<!-----------------------
			ECRAN 1 - FORMULAIRE
			Affiché au départ
			Caché quand on clique sur "Invoquer"
			------------------------->
		<section> 
			<h1>La Machine à Invocation</h1>

			<form id="invocation">
				<p> <!---------ZONE PRENOM------------>
					<label for="prenom">Donne-moi ton prénom :</label><br />
					<input type="text" name="prenom" id="prenom" required /> <!--Pour lier le "label" au champ, on lui donne un attribut "for" qui a la même valeur que l' "id" du champ-->
				</p>
				<p> <!--------ZONE CHOIX CREATURE------>
					<label for="creature">Choisis ta créature :</label><br />
					<select name="creature" id="creature">
						<option value="chat">😸 le Chat-Octo</option>
						<option value="dragon">🐉 le Dragon-Debug</option>
						<option value="licorne">🦄 la Licorne-CSS</option>
						<option value="renard">🦊 le Renard-Refacto</option>
					</select>
				</p>
				<p> <!----------ZONE BOUTON---------->
					<button id="invoquer">Invoquer !</button>
				</p>
			</form>
		</section>

		<!-----------------------
			ECRAN 2 - RESULTATS
			Caché au départ
			Affiché après avoir cliqué sur "Invoquer"
			------------------------->
		<section id="resultat" class="cache">
			<p id="message"></p>
		</section>


	<script src="script.js" defer></script>
</body>
